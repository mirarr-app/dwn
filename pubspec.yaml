name: dwn
description: "A Linux desktop download manager"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.1
  file_selector: ^1.0.0
  url_launcher: ^6.2.2
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  collection: ^1.18.0
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/image.png

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
